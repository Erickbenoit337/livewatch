version: "3.9"

# =============================================================
#  Livewatch — Docker Compose
#  Usage :
#    docker compose up -d            # Démarrer
#    docker compose logs -f livewatch # Voir les logs
#    docker compose down             # Arrêter
# =============================================================

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: livewatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       livewatch
      POSTGRES_USER:     livewatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livewatch_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livewatch -d livewatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livewatch_net

  # ── Livewatch App ────────────────────────────────────────────
  livewatch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livewatch_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:    postgresql://livewatch:${POSTGRES_PASSWORD:-livewatch_secret}@postgres:5432/livewatch
      SECRET_KEY:      ${SECRET_KEY:-changeme_generate_strong_key}
      ADMIN_USERNAME:  ${ADMIN_USERNAME:-WALKER92259}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-WALKER92259}
      ADMIN_EMAIL:     ${ADMIN_EMAIL:-erickbenoit337@gmail.com}
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
      - livewatch_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - livewatch_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── pgAdmin (optionnel — interface web PostgreSQL) ───────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: livewatch_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@livewatch.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - livewatch_net
    profiles:
      - tools   # Activer avec : docker compose --profile tools up -d

volumes:
  postgres_data:
    driver: local
  livewatch_logs:
    driver: local

networks:
  livewatch_net:
    driver: bridgeker